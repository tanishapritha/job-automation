<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Automation Dash</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <header>
            <div class="brand">Job Automation</div>
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon" id="themeIcon"></i>
                <span id="themeText">Dark Mode</span>
            </button>
        </header>

        <main class="dashboard">
            <!-- Parameters Panel -->
            <aside class="sidebar">
                <div class="card">
                    <div class="section-title"><i class="fas fa-sliders"></i> Parameters</div>
                    
                    <div class="field">
                        <label>Domains</label>
                        <input type="text" id="domains" value="Web Development; AI">
                    </div>

                    <div class="field">
                        <label>Target Locations</label>
                        <input type="text" id="loc1" placeholder="City 1" value="London, UK">
                        <input type="text" id="loc2" placeholder="City 2" value="Remote">
                    </div>

                    <div class="field">
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="checkbox" id="remoteFilter" checked style="width: auto;">
                            Include Remote
                        </label>
                    </div>

                    <div class="field">
                        <label>Experience</label>
                        <select id="expLevel">
                            <option value="beginner">Beginner</option>
                            <option value="mid" selected>Mid Level</option>
                            <option value="senior">Senior</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>Floor Salary (₹/Y)</label>
                        <input type="number" id="minSalary" step="100000" value="1000000">
                    </div>

                    <button class="btn-search" id="startSearch">
                        Launch Hunt
                    </button>
                </div>
            </aside>

            <!-- Results Stream -->
            <section>
                <div class="section-title" id="feedTitle" style="display: flex; justify-content: space-between;">
                    <span><i class="fas fa-bolt"></i> Live Feed</span>
                    <div id="loading" style="display: none;"><div class="spinner"></div></div>
                </div>

                <div class="job-feed" id="jobFeed">
                    <!-- Cards populated here -->
                    <div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 5rem;">
                         <i class="fas fa-search-plus" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                         <p>Define your hunt parameters and start.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
