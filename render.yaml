services:
  - type: web
    name: job-automation
    runtime: python
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobs-db
          property: connectionString
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

databases:
  - name: jobs-db
    plan: free
